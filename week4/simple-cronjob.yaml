apiVersion: batch/v1
kind: CronJob
metadata:
  name: pingpong
spec:
  schedule: "*/1 * * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: pingpong
        spec:
          containers:
            - name: pingpong
              image: busybox:1.36
              command:
                - /bin/sh
                - -c
                - |
                  echo "$(date) ping!"
                  sleep 10
                  echo "$(date) pong!"
          restartPolicy: OnFailure
