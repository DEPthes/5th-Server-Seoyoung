apiVersion: batch/v1
kind: Job
metadata:
  name: pingpong
  labels:
    app: pingpong
spec:
  parallelism: 3
  template:
    metadata:
      labels:
        app: pingpong
    spec:
      containers:
        - name: pingpong
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "$(date) ping!"
              sleep 10
              echo "$(date) pong!"
      restartPolicy: Never
